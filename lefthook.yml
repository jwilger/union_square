# lefthook configuration
# Install with: lefthook install

pre-commit:
  parallel: true
  commands:
    cargo-fmt:
      run: just fmt-check
      glob: "*.rs"

    cargo-clippy:
      run: just clippy
      glob: "*.rs"

    cargo-check:
      run: just check
      glob: "*.rs"

    cargo-test:
      run: just test
      glob: "*.rs"

    ast-grep:
      run: just ast-grep-branch
      glob: "*.rs"

    trailing-whitespace:
      run: |
        files="$(git diff --cached --name-only --diff-filter=ACMR)"
        if [ -n "$files" ] && printf '%s\n' "$files" | xargs grep -n '[[:space:]]$'; then
          echo "Trailing whitespace found."
          exit 1
        fi

    check-merge-conflict:
      run: git diff --cached --name-only | xargs grep -l "<<<<<<< HEAD" || true

commit-msg:
  commands:
    conventional-commit:
      run: |
        MESSAGE=$(cat {1})
        if ! echo "$MESSAGE" | grep -qE '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z-]+\))?!?: .{1,72}$'; then
          echo "Commit message does not follow Conventional Commits format."
          echo "Format: <type>[optional-scope]: <description>"
          echo "Types: build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test"
          exit 1
        fi

pre-push:
  parallel: true
  commands:
    cargo-fmt-check:
      run: just fmt-check
      glob: "*.rs"

    cargo-clippy:
      run: just clippy
      glob: "*.rs"

    cargo-test:
      run: just test
      glob: "*.rs"

    ast-grep:
      run: just ast-grep-branch
      glob: "*.rs"
