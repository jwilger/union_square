# lefthook configuration
# Install with: lefthook install
#
# This file delegates to the Justfile so that local and CI checks stay in sync.
# See: Justfile

pre-commit:
  parallel: true
  commands:
    cargo-fmt:
      run: just fmt-check
      glob: "*.rs"

    cargo-clippy:
      run: just clippy
      glob: "*.rs"

    cargo-check:
      run: just type-check
      glob: "*.rs"

    cargo-test:
      run: just test
      glob: "*.rs"

    ast-grep:
      run: just ast-grep
      glob:
        - "*.rs"
        - "sgconfig.yml"
        - ".opencode/rules/ast-grep/**"

    # Lefthook must not mutate files after staging (non-deterministic).
    # Trailing whitespace is handled by editor/IDE configuration and cargo fmt.
    # If you need to trim whitespace, run: git diff --cached --name-only | xargs sed -i 's/[[:space:]]*$//'

    check-merge-conflict:
      run: |
        CONFLICT_FILES=$(git diff --cached --name-only -z | xargs -0 grep -lE "^(<<<<<<<|=======|>>>>>>>)" 2>/dev/null || true)
        if [ -n "$CONFLICT_FILES" ]; then
          echo "Merge conflict markers found in:"
          echo "$CONFLICT_FILES"
          exit 1
        fi

commit-msg:
  commands:
    conventional-commit:
      run: |
        MESSAGE=$(cat {1})
        if ! echo "$MESSAGE" | grep -qE '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z-]+\))?!?: .{1,72}$'; then
          echo "Commit message does not follow Conventional Commits format."
          echo "Format: <type>[optional-scope]: <description>"
          echo "Types: build, chore, ci, docs, feat, fix, perf, refactor, revert, style, test"
          exit 1
        fi

pre-push:
  parallel: true
  commands:
    cargo-fmt-check:
      run: just fmt-check
      glob: "*.rs"

    cargo-clippy:
      run: just clippy
      glob: "*.rs"

    cargo-test:
      run: just test
      glob: "*.rs"

    ast-grep:
      run: just ast-grep
      glob:
        - "*.rs"
        - "sgconfig.yml"
        - ".opencode/rules/ast-grep/**"
