permissions:
  contents: read
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      deps: ${{ steps.filter.outputs.deps }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
      id: filter
      with:
        filters: |
          rust:
            - 'src/**'
            - 'tests/**'
            - 'benches/**'
            - 'Cargo.toml'
            - 'Cargo.lock'
            - 'rust-toolchain.toml'
            - '.cargo/**'
            - 'scripts/**'
            - 'Dockerfile'
            - '.github/workflows/ci.yml'
            - 'Justfile'
            - 'lefthook.yml'
            - 'sgconfig.yml'
          deps:
            - 'Cargo.toml'
            - 'Cargo.lock'
            - '.github/workflows/ci.yml'
          workflows:
            - '.github/workflows/**'

  test:
    name: Test Suite
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: union_square
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      with:
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      with:
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install just and cargo-nextest
      run: |
        cargo install just --locked
        cargo install cargo-nextest --locked

    - name: Run local CI contract
      run: just ci
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/union_square

  security:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

    - name: Cache dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

    - name: Install cargo-audit
      run: cargo install cargo-audit --locked

    - name: Run security audit
      run: cargo audit

  cargo-deny:
    name: Cargo Deny
    needs: changes
    if: needs.changes.outputs.deps == 'true' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

    - name: Cache dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

    - name: Install cargo-deny
      run: cargo install cargo-deny --locked

    - name: Run cargo-deny
      run: cargo deny check licenses bans sources

  architecture-lint:
    name: Architecture Lint
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      with:
        components: rustfmt, clippy

    - name: Cache dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

    - name: Install just
      run: cargo install just --locked

    - name: Run ast-grep architecture checks
      run: just ast-grep

    - name: Run ast-grep rule tests
      run: just ast-grep-test

    - name: Run clippy architecture denies
      # Baseline debt: existing code has unwrap/expect violations.
      # This job reports new violations without blocking merge.
      # Remove continue-on-error once baseline is clean.
      continue-on-error: true
      run: just clippy-architecture

  coverage:
    name: Code Coverage
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: union_square
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      with:
        components: llvm-tools-preview

    - name: Cache dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

    - name: Install cargo-llvm-cov
      run: cargo install cargo-llvm-cov --locked

    - name: Generate code coverage
      run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/union_square

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
      with:
        file: lcov.info
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

    - name: Cache dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

    - name: Build debug
      run: cargo build --workspace

    - name: Build release
      run: cargo build --workspace --release

  cross-platform:
    name: Cross-platform Build
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

    - name: Cache dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

    - name: Build
      run: cargo build --workspace

  performance-check:
    name: Performance Validation
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

    - name: Cache dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

    - name: Run performance validation tests
      run: cargo test --test benchmark_validation

    - name: Run quick benchmarks
      run: cargo bench --bench proxy_performance -- --quick --noplot

  performance-benchmarks:
    name: Performance Benchmarks
    needs: changes
    if: |
      needs.changes.outputs.rust == 'true' && (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' &&
         (startsWith(github.head_ref, 'release-plz-') ||
          github.event.pull_request.user.login == 'github-actions[bot]'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
      MAX_LATENCY_MS: 5
      MAX_REGRESSION_PERCENT: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      with:
        fetch-depth: 0

    - name: Install Rust
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

    - name: Cache dependencies
      uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      with:
        key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

    - name: Install cargo-criterion
      run: |
        cargo install cargo-criterion --locked || true
        cargo install critcmp --locked || true

    - name: Run benchmark validation tests
      run: cargo test --test benchmark_validation

    - name: Get baseline benchmark results
      if: github.event_name == 'pull_request'
      run: |
        git fetch origin ${{ github.base_ref }}
        git checkout origin/${{ github.base_ref }}
        cargo bench --bench proxy_performance -- --save-baseline base --sample-size 50
        git checkout -

    - name: Run performance benchmarks
      run: |
        cargo bench --bench proxy_performance -- --save-baseline current --sample-size 50

    - name: Compare benchmark results
      if: github.event_name == 'pull_request'
      id: benchmark_comparison
      run: |
        critcmp base current > comparison.txt || true

        REGRESSION_FOUND=false

        while IFS= read -r line; do
          if echo "$line" | grep -E '\+[0-9]+\.[0-9]+%' > /dev/null; then
            PERCENT=$(echo "$line" | grep -oE '\+[0-9]+\.[0-9]+' | tr -d '+')
            if awk -v p="$PERCENT" -v t="$MAX_REGRESSION_PERCENT" 'BEGIN { exit !(p >= t) }'; then
              echo "Regression found: +${PERCENT}% exceeds threshold of ${MAX_REGRESSION_PERCENT}%"
              REGRESSION_FOUND=true
            fi
          fi
        done < comparison.txt

        if [ "$REGRESSION_FOUND" = true ]; then
          echo "Performance regression detected!"
          echo "REGRESSION_DETECTED=true" >> $GITHUB_OUTPUT
        else
          echo "No significant regression detected"
          echo "REGRESSION_DETECTED=false" >> $GITHUB_OUTPUT
        fi

        echo '```' > benchmark_report.md
        cat comparison.txt >> benchmark_report.md
        echo '```' >> benchmark_report.md

    - name: Run memory profiling
      run: |
        cargo bench --bench memory_profiling > memory_profile.txt 2>&1 || true

    - name: Post benchmark results to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');

          let comment = '## 📊 Performance Benchmark Results\n\n';

          try {
            const comparison = fs.readFileSync('benchmark_report.md', 'utf8');
            comment += '### Benchmark Comparison (base vs current)\n';
            comment += comparison + '\n\n';
          } catch (e) {
            comment += '### Benchmark Results\n';
            comment += 'No baseline comparison available.\n\n';
          }

          try {
            const memProfile = fs.readFileSync('memory_profile.txt', 'utf8');
            const lines = memProfile.split('\n').slice(-20).join('\n');
            comment += '### Memory Profile Summary\n';
            comment += '```\n' + lines + '\n```\n\n';
          } catch (e) {
            console.log('No memory profile available');
          }

          const regressionDetected = '${{ steps.benchmark_comparison.outputs.REGRESSION_DETECTED }}' === 'true';
          if (regressionDetected) {
            comment += '⚠️ **Performance regression detected!** Please review the benchmark comparison above.\n';
            comment += 'Regressions exceeding ' + process.env.MAX_REGRESSION_PERCENT + '% require justification.\n';
          } else {
            comment += '✅ **No significant performance regressions detected.**\n';
          }

          comment += '\n<sub>All latency requirements (&lt;' + process.env.MAX_LATENCY_MS + 'ms) are enforced by the test suite.</sub>';

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const botComment = comments.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes('Performance Benchmark Results')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: comment,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });
          }

    - name: Fail if regression detected
      if: steps.benchmark_comparison.outputs.REGRESSION_DETECTED == 'true'
      run: |
        echo "Performance regression detected! See PR comment for details."
        exit 1

  gh-actions-security:
    name: GitHub Actions Security
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Install zizmor
      run: cargo install zizmor --locked

    - name: Run zizmor
      run: zizmor .github/workflows/

    - name: Install actionlint
      run: |
        curl -sL https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz | tar xz -C /tmp
        sudo mv /tmp/actionlint /usr/local/bin/

    - name: Run actionlint
      run: actionlint .github/workflows/

  ci-success:
    name: CI Success
    needs: [changes, test, security, cargo-deny, architecture-lint, coverage, build, cross-platform, performance-check, performance-benchmarks, gh-actions-security]
    if: always()
    runs-on: ubuntu-latest
    steps:
    - name: Verify no required job failed
      run: |
        for result in ${{ join(needs.*.result, ' ') }}; do
          if [ "$result" = "failure" ]; then
            echo "Job failed with result: $result"
            exit 1
          fi
        done
        echo "All required jobs passed or were skipped."
