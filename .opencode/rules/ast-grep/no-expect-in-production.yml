id: no-expect-in-production
language: rust
severity: error
message: "expect() is forbidden in production code. Use ? or match instead."
# Note: tree-sitter parses #[cfg(test)] as an attribute_item sibling of mod_item,
# not as a child, so has: kind: attribute_item inside mod_item does not match.
# The regex-based module-name exclusion is the most precise filter achievable.
rule:
  pattern: $X.expect($MSG)
  not:
    inside:
      stopBy: end
      kind: mod_item
      regex: "mod (test.*|benchmarks|.*_test.*)"
ignores:
  # Benchmark and test infrastructure (baseline debt)
  - benches/**/*.rs
  - tests/**/*.rs
  - src/**/*_tests.rs
  - src/**/*_test.rs
  - src/**/tests.rs
  - src/**/test_utils.rs
  - src/**/middleware_test_helpers.rs
  - src/**/benchmark_types.rs
  - src/**/ring_buffer_performance_test.rs
  # Demo data (baseline debt)
  - src/**/demo_data.rs
  - src/**/demo_types.rs
  # Metrics constants (baseline debt)
  - src/domain/metrics/timestamp.rs
  - src/domain/config_types.rs
  # Provider and proxy code (baseline debt)
  - src/providers/**/*.rs
  - src/proxy/**/*.rs
  - src/adapters/**/*.rs
  # Config and error modules (baseline debt)
  - src/config.rs
  - src/error.rs
