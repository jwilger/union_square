id: no-raw-primitive-domain-state
language: rust
severity: warning
message: "Avoid using raw primitives for domain state. Consider newtypes with nutype."
files:
  - src/domain/**/*.rs
rule:
  all:
    - pattern: |
        struct $NAME {
          $FIELD: $TYPE,
        }
    - not:
        inside:
          stopBy: end
          kind: mod_item
          regex: "mod (test.*|benchmarks|.*_test.*)"
constraints:
  TYPE:
    regex: "^String$|^i32$|^i64$|^f32$|^f64$|^u32$|^u64$|^bool$"
